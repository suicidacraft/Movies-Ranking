<!doctype html>
<html>
  <head>
    <title>LA TV Shows | Home</title>
    <meta name="description" content="A Catalog of movies in the IMDB website" />
    <link rel="stylesheet" href="style.css" />
    <script src = "movie.js"></script>
    <script type="text/javascript" src="scripts.js"></script>
  </head>

  <body>
    <header class="main-header">
      <h1 class="title">Catalogue of Movies from IMDB</h1>
    </header>
    <div id="card-container"></div>
    <div class="card" style="display: none">
      <div class="card-content">
        <h2>Movie Title</h2>
        <img src="" alt="TV Show Poster" />
        <ul>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        </ul>
      </div>
    </div>
     <div class="hover-zone left" onmouseenter="HoverLeft()" onmouseleave="HoverOut()"></div>
    <div class="hover-zone right" onmouseenter="HoverRight()" onmouseleave="HoverOut()"></div>
    <button onclick="LastButton()">◀ Last</button>
    <select onchange="Sort(this.value)">
      <option value="">-- Sort By --</option>
      <option value="Meta_score">Rating</option>
      <option value="Released_Year">Year</option>
      <option value="Gross">Money</option>
      <option value="Runtime">Runtime</option>
    </select>
    <button onclick="NextButton()">Next ▶</button>
  </body>
</html>
